<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fake News Detector Pro</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
}

.container {
    margin-top: 80px;
}

h1 {
    font-size: 40px;
}

textarea {
    width: 60%;
    height: 150px;
    border-radius: 12px;
    border: none;
    padding: 15px;
    font-size: 16px;
    outline: none;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #ff7eb3;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4f9a;
    transform: scale(1.05);
}

.result-box {
    margin-top: 30px;
    font-size: 24px;
    font-weight: bold;
    padding: 15px;
    border-radius: 10px;
    display: inline-block;
}

.fake {
    background: #ff4d4d;
}

.real {
    background: #28a745;
}

.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Fake News Detector Pro</h1>
    <p>Analyze news instantly using smart logic</p>

    <textarea id="newsInput" placeholder="Paste news article here..."></textarea><br>
    <button onclick="analyzeNews()">🔍 Analyze</button>

    <div id="result"></div>
</div>

<div class="footer">
    Built for SDG 16 – Peace, Justice & Strong Institutions 🌍
</div>

<script>
function analyzeNews() {
    let text = document.getElementById("newsInput").value.toLowerCase();
    let resultDiv = document.getElementById("result");

    if (text.trim() === "") {
        alert("Please enter news content!");
        return;
    }

    // Advanced keyword scoring
    let fakeIndicators = ["shocking", "breaking!!!", "100% cure", "guaranteed", "click here", "rumor", "fake", "secret"];
    let realIndicators = ["reported", "according to", "official", "data", "research", "study"];

    let score = 0;

    fakeIndicators.forEach(word => {
        if (text.includes(word)) score -= 1;
    });

    realIndicators.forEach(word => {
        if (text.includes(word)) score += 1;
    });

    // Result logic
    if (score < 0) {
        resultDiv.innerHTML = "❌ Fake News Detected";
        resultDiv.className = "result-box fake";
    } else {
        resultDiv.innerHTML = "✅ Likely Real News";
        resultDiv.className = "result-box real";
    }
}
</script>

</body>
</html>
